<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dicionário AVL</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Dicionário</h2>

    <!-- 📂 CARREGAR ARQUIVO -->
    <div class="bloco">
        <h3>Importar Dicionário</h3>
        <input type="file" id="arquivo">
        <button onclick="carregarArquivo()">Carregar</button>
    </div>

    <!-- ➕ INSERIR / REMOVER -->
    <div class="bloco">
        <h3>Gerenciar Palavra</h3>
        <input id="palavra" placeholder="Palavra">
        <input id="significado" placeholder="Significado">
        <br>
        <button onclick="inserir()">Inserir/Editar</button>
        <button onclick="remover()">Remover</button>
    </div>

    <!-- 📊 PERCURSOS -->
    <div class="bloco">
        <h3>Percursos da Árvore</h3>
        <button onclick="mostrarEmOrdem()">Em Ordem</button>
        <button onclick="mostrarPreOrdem()">Pré-Ordem</button>
        <button onclick="mostrarPosOrdem()">Pós-Ordem</button>
        <button onclick="mostrarAmplitude()">Amplitude</button>
        <button onclick="mostrarProfundidade()">Profundidade</button>
    </div>

    <!-- 🔍 BUSCA -->
    <div class="bloco">
        <h3>Buscar</h3>
        <input id="busca" placeholder="Digite a palavra">
        <button onclick="buscar()">Buscar</button>
    </div>

    <div>
        <button onclick="mostrarAltura()">Altura</button>
        <button onclick="mostrarLargura()">Largura</button>
        <h3>Resultado:</h3>
        <p id="resultado"></p>
    </div>

    <!-- 📚 DICIONÁRIO -->
    <div>
        <h3>Dicionário:</h3>
        <div id="lista"></div>
    </div>

    <!-- 💾 SALVAR -->
    <button onclick="salvar()">Salvar no arquivo</button>

    <script type="module" src="script.js"></script>
</body>

</html>
